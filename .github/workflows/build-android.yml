name: Build Gupta Legacy Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-android:
    name: Build debug APK and AAB
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Verify project structure
        shell: bash
        run: |
          test -f android-app/settings.gradle
          test -f android-app/build.gradle
          test -f android-app/app/build.gradle
          test -f android-app/app/src/main/AndroidManifest.xml
          test -f android-app/app/src/main/java/com/guptalegacy/app/MainActivity.java
          test -f android-app/app/src/main/assets/index.html
          echo "Gupta Legacy Android project structure OK"

      - name: Build debug APK
        working-directory: android-app
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Build debug AAB
        working-directory: android-app
        run: gradle --no-daemon --stacktrace :app:bundleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GuptaLegacy-debug-apk
          path: android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: GuptaLegacy-debug-aab
          path: android-app/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
          retention-days: 14
