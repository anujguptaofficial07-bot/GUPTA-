name: Build Gupta Legacy Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-android:
    name: Build debug APK and AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        shell: bash
        run: |
          echo "Root files:"
          ls -la

      - name: Extract ZIP if uploaded
        shell: bash
        run: |
          mkdir -p extracted
          if ls *.zip >/dev/null 2>&1; then
            echo "ZIP found. Extracting..."
            for file in *.zip; do
              echo "Extracting $file"
              unzip -o "$file" -d extracted
            done
          else
            echo "No ZIP found in root. Continuing..."
          fi

      - name: Find Android project
        shell: bash
        run: |
          echo "Searching for settings.gradle..."
          PROJECT_DIR=$(find . -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1 | xargs dirname)

          if [ -z "$PROJECT_DIR" ]; then
            echo "Android project not found. settings.gradle missing."
            echo "Files available:"
            find . -maxdepth 4 -type f | head -100
            exit 1
          fi

          echo "Android project found at: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify project structure
        shell: bash
        run: |
          echo "Using project dir: $PROJECT_DIR"

          test -f "$PROJECT_DIR/settings.gradle" || test -f "$PROJECT_DIR/settings.gradle.kts"
          test -f "$PROJECT_DIR/build.gradle" || test -f "$PROJECT_DIR/build.gradle.kts"
          test -f "$PROJECT_DIR/app/build.gradle" || test -f "$PROJECT_DIR/app/build.gradle.kts"
          test -f "$PROJECT_DIR/app/src/main/AndroidManifest.xml"
          test -f "$PROJECT_DIR/app/src/main/assets/index.html"

          echo "Android project structure OK"

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Build debug AAB
        working-directory: ${{ env.PROJECT_DIR }}
        run: gradle --no-daemon --stacktrace :app:bundleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GuptaLegacy-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: GuptaLegacy-debug-aab
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
          retention-days: 14
